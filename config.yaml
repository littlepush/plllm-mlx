# plllm-mlx Configuration
# Copy this file to config.yaml and modify as needed

# Server configuration
server:
  host: "0.0.0.0"
  port: 8000
  log_level: "info"  # debug, info, warning, error

# Model configuration
model:
  # Model name or path (HuggingFace model ID or local path)
  name: "Qwen/Qwen2.5-7B-Instruct"
  
  # Generation parameters
  max_tokens: 4096
  temperature: 0.7
  top_p: 1.0
  top_k: 50
  repetition_penalty: 1.0
  
  # Model loading options
  trust_remote_code: true
  use_fast_tokenizer: true

# Cache configuration
cache:
  # Enable prefix KV cache for multi-turn conversations
  enable_prefix_cache: true
  
  # Maximum memory usage ratio (0.0 - 1.0)
  # Will trigger cache eviction when system memory exceeds this threshold
  max_memory_ratio: 0.9
  
  # Minimum number of cache entries to keep during eviction
  min_entries: 3

# Logging configuration
logging:
  # Log format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Log to file (optional)
  # file: "plllm-mlx.log"